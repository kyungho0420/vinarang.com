<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vinarang - 비나랑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index,follow">
    <meta name="description" content="Where is your happiness">
    <meta name="keywords" content="Vina, Vlog, Travel, Daily">
    <meta property="og:title" data-lang="og_title" content="Vinarang">
    <meta property="og:description" data-lang="og_description" content="Where is your happiness">
    <meta property="og:url" content="https://www.vinarang.com">
    <meta property="og:site_name" content="Vinarang">
    <meta property="og:image" content="./images/namecard.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="600">
    <link id="favicon" rel="icon" type="image/x-icon" href="./images/favicon.ico"/>
    <link rel="apple-touch-icon" href="./images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Kanit:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="./express/canvas-v1.css">
    <link rel="stylesheet" href="lay.css">

    <script src="./express/canvas-v1.js"></script>
    <script src="lay.js"></script>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback" async defer></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "provider": {
        "@type": "Person",
        "name": "Vinarang"
      },
      "name": "Vinarang",
      "url": "https://www.vinarang.com",
      "logo": "./images/logo.png",
      "description": "Where is your happiness"
    }
    </script>
</head>
<body class="canvas-mode-v1">
    <div class="bg-dotted"></div>
    <canvas id="bg-canvas"></canvas>

    <main id="main-container" class="main-container">
        <div class="branding-area">
            <h1 translate="no" class="logo-title notranslate">vinarang</h1>
            <p class="logo-subtitle">where is your happiness</p>
        </div>
        <div class="content-area">
            <div class="content-area-inner">
                <div id="content-wrapper">
                    <div id="search-view" class="view active">
                        <form id="search-form" autocomplete="off">
                            <div class="search-form-wrapper">
                                <input type="text" id="search-key" name="key" required class="search-input" placeholder="Search" autocomplete="off">
                                <button type="submit" id="search-btn" class="search-button" aria-label="Search">
                                    <span class="btn-text"><span translate="no" class="material-symbols-outlined notranslate icon-color">search</span></span>
                                    <span class="btn-loader hidden"><span translate="no" class="material-symbols-outlined notranslate icon-color animate-spin">progress_activity</span></span>
                                </button>
                            </div>
                        </form>
                        <div id="search-status" class="search-status"></div>
                        <div id="buttons-container" class="buttons-container">
                            <button id="contact-btn" class="fab" aria-label="Open contact form">
                                <span translate="no" class="material-symbols-outlined notranslate icon-color">mail</span>
                            </button>
                        </div>
                    </div>

                    <div id="contact-view" class="view">
                        <div class="view-header">
                            <button class="view-close-btn"><span translate="no" class="material-symbols-outlined notranslate" style="margin-right:0.5rem;">arrow_back</span> Back</button>
                        </div>
                        <div class="view-content">
                            <button class="modal-close-btn view-close-btn" aria-label="Close modal"><span translate="no" class="material-symbols-outlined notranslate">close</span></button>
                        </div>
                    </div>

                    <div id="search-result-view" class="view">
                        <div class="view-header">
                            <button class="view-close-btn"><span translate="no" class="material-symbols-outlined notranslate" style="margin-right:0.5rem;">arrow_back</span> Back</button>
                        </div>
                        <div class="view-content">
                            <button class="modal-close-btn view-close-btn" aria-label="Close modal"><span translate="no" class="material-symbols-outlined notranslate">close</span></button>
                            <div class="result-area"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <template id="contact-form-template">
        <h2 class="contact-title">Contact</h2>
        <form id="contact-form" autocomplete="off">
            <input type="email" name="email" required class="contact-input" placeholder="Your Email Address" autocomplete="off">
            <div class="textarea-wrapper">
                <textarea name="message" rows="5" required maxlength="1024" class="contact-textarea" placeholder="Your Message" autocomplete="off"></textarea>
                <div class="char-counter">0/1024</div>
            </div>
            <button type="submit" class="contact-submit-btn">
                <span class="btn-text">Send</span>
                <span class="btn-loader hidden"><span translate="no" class="material-symbols-outlined notranslate icon-color animate-spin" style="color:white;">progress_activity</span></span>
            </button>
            <div class="contact-status"></div>
        </form>
    </template>

    <div id="turnstile-container" style="position:absolute; top:-9999px; left:-9999px;"></div>
</body>
</html>
