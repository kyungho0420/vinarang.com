<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link id="favicon" rel="icon" type="image/x-icon" href="https://cdn.dam.so/_image/seo/maxim/favicon.ico"/>
    <link rel="apple-touch-icon" href="https://cdn.dam.so/_image/seo/maxim/logo.png">
    <style>
        :root {
            --bg-color: #777;
            --text-color: #EEE;
            --header-color: #FFF;
            --button-bg: #555;
            --button-hover-bg: #333;
            --button-text: #FFF;
        }

        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            padding: 2rem;
        }

        h1 {
            font-size: clamp(4rem, 1rem + 10vw, 8rem);
            font-weight: 700;
            color: var(--header-color);
            margin: 0;
            line-height: 1;
            letter-spacing: 0.05em;
        }

        p {
            font-size: 1.125rem;
            margin: 1rem 0 2rem 0;
            opacity: 0.8;
        }

        .home-button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.2s ease-in-out, transform 0.2s ease-in-out;
        }

        .home-button:hover {
            background-color: var(--button-hover-bg);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Sorry, the page you are looking for could not be found.</p>
        <a href="https://www.maxim.pe.kr/contactme" class="home-button" target="_blank" rel="noopener noreferrer">Contact Us</a>
    </div>
</body>
</html>
